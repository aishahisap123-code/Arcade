<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboards - Aishah Arcade</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1 class="neon-title">LEADERBOARDS</h1>
</header>

<main style="text-align:center; padding:2rem;">

    <div class="leaderboard-container">

        <div class="board">
            <h2>PONG</h2>
            <ul id="pong"></ul>
        </div>

        <div class="board">
            <h2>BREAKOUT</h2>
            <ul id="breakout"></ul>
        </div>

        <div class="board">
            <h2>INVADERS</h2>
            <ul id="invaders"></ul>
        </div>

        <div class="board">
            <h2>FLAPPY</h2>
            <ul id="flappy"></ul>
        </div>

        <div class="board">
            <h2>SNAKE</h2>
            <ul id="snake"></ul>
        </div>

        <div class="board">
            <h2>REACTION</h2>
            <ul id="reaction"></ul>
        </div>

    </div>

    <div style="margin-top: 3rem;">
        <a href="index.html" class="game-card">BACK TO ARCADE</a>
    </div>

</main>

<script src="leaderboard.js"></script>

</body>
</html>
