<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breakout - Aishah Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
    <h1 class="neon-title">BREAKOUT</h1>
</header>
<button onclick="toggleMusic()" class="btn">MUSIC ON/OFF</button>

<main style="padding: 2rem; text-align: center;">

    <div style="position: relative; display: inline-block;">
        <canvas id="breakoutCanvas" width="600" height="400"></canvas>

        <div id="startMessage" class="overlay-screen">
            <h2>CLICK TO START</h2>
        </div>
    </div>

    <div style="margin-top: 2rem;">
        <p>Score: <span id="score">0</span></p>
    </div>

    <div style="margin-top: 3rem;">
        <a href="../index.html" class="game-card">BACK TO ARCADE</a>
    </div>

</main>

<script src="breakout.js"></script>
</body>
</html>
